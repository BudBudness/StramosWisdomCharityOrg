services:
  postgres:
    image: postgres:16-alpine
    container_name: stramos-postgres
    environment:
      POSTGRES_USER: stramos
      POSTGRES_PASSWORD: stramos_dev_password
      POSTGRES_DB: stramos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stramos -d stramos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stramos-backend
    environment:
      DATABASE_URL: postgresql+psycopg://stramos:stramos_dev_password@postgres:5432/stramos
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: stramos-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
